name: "Build Flipper App"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uFBT
        run: |
          python -m pip install --upgrade pip
          pip install ufbt

      - name: Build FAP
        run: |
          # uFBT télécharge automatiquement le SDK de la branche 'release'
          ufbt
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fap-binary
          path: dist/*.fap
